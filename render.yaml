services:
  # Backend - Node.js Express + tRPC
  - type: web
    name: imovai-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_VERSION
        value: 18.16.0
      - key: DATABASE_URL
        fromDatabase:
          name: imovai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false # Set in Render Dashboard

  # Frontend - Next.js App Router (Static)
  - type: web
    name: imovai-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://imovai-backend.onrender.com

databases:
  - name: imovai-db
    plan: free
    ipAllowList:
      - source: 74.220.48.0/24
        description: Acesso Externo Seguro 1
      - source: 74.220.56.0/24
        description: Acesso Externo Seguro 2
      - source: 0.0.0.0/0
        description: Acesso Público (Necessário para planos Free)
