services:
  # Backend - Node.js Express + tRPC
  - type: web
    name: imovai-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_VERSION
        value: 18.16.0
      - key: DATABASE_URL
        fromDatabase:
          name: imovai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false # Set in Render Dashboard

  # Frontend - Next.js App Router (Static)
  - type: web
    name: imovai-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://imovai-backend.onrender.com

databases:
  - name: imovai-db
    plan: free
